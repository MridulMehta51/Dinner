<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dinner at Mehta's 🍽️</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 40%,#1e2d1a 100%);font-family:Georgia,serif;color:#f0ead8;padding:2rem 1rem}
  h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:400;letter-spacing:.04em;color:#e8cfa0;margin-bottom:.4rem}
  .hero{text-align:center;margin-bottom:2.5rem}
  .hero p{font-style:italic;color:rgba(240,234,216,.55);font-size:1rem}
  .details{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-top:.6rem;font-size:.88rem;color:rgba(240,234,216,.55);font-family:system-ui,sans-serif}
  .card{background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.12);border-radius:16px;padding:1.6rem;max-width:560px;margin:0 auto 1.5rem}
  .tabs{display:flex;justify-content:center;gap:8px;margin-bottom:1.5rem}
  .tab{padding:8px 24px;border-radius:20px;border:0.5px solid rgba(255,255,255,.12);background:transparent;color:rgba(240,234,216,.55);cursor:pointer;font-family:system-ui,sans-serif;font-size:.82rem;text-transform:uppercase;letter-spacing:.1em;transition:all .15s}
  .tab.active{border-color:#c8a96e;background:#c8a96e;color:#1a0a2e;font-weight:600}
  .section-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:#c8a96e;margin-bottom:1.2rem;font-family:system-ui,sans-serif}
  label{display:block;font-size:.82rem;color:rgba(240,234,216,.55);margin-bottom:.35rem;font-family:system-ui,sans-serif}
  input,textarea{width:100%;background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 12px;color:#f0ead8;font-size:.95rem;font-family:system-ui,sans-serif;outline:none}
  textarea{resize:vertical;min-height:72px}
  .field{margin-bottom:1rem}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:6px 14px;border-radius:20px;font-size:.8rem;font-family:system-ui,sans-serif;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.07);color:rgba(240,234,216,.55);border:0.5px solid rgba(255,255,255,.12)}
  .chip.on{background:#c8a96e;color:#1a0a2e;border-color:#c8a96e;font-weight:600}
  .yn{display:flex;gap:10px}
  .yn-btn{flex:1;padding:10px;border-radius:8px;border:0.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(240,234,216,.55);cursor:pointer;font-family:system-ui,sans-serif;font-size:.85rem;font-weight:500;transition:all .15s}
  .yn-btn.yes.on{border-color:#6fcf97;background:rgba(111,207,151,.15);color:#6fcf97}
  .yn-btn.no.on{border-color:#eb5757;background:rgba(235,87,87,.15);color:#eb5757}
  .btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;background:#c8a96e;color:#1a0a2e;font-size:.95rem;font-family:system-ui,sans-serif;font-weight:600;letter-spacing:.03em;margin-top:.5rem;transition:all .15s}
  .btn:disabled{background:rgba(200,169,110,.25);color:rgba(240,234,216,.4);cursor:not-allowed}
  .success{text-align:center;padding:2rem 1rem}
  .success h2{font-size:1.4rem;font-weight:400;color:#e8cfa0;margin-bottom:.5rem}
  .success p{color:rgba(240,234,216,.55);font-family:system-ui,sans-serif;font-size:.9rem;margin-bottom:1.5rem}
  .edit-btn{padding:9px 28px;border-radius:8px;border:0.5px solid #c8a96e;background:transparent;color:#c8a96e;cursor:pointer;font-family:system-ui,sans-serif;font-size:.85rem}
  .stats{display:flex;gap:12px;margin-bottom:1.4rem}
  .stat{flex:1;background:rgba(255,255,255,.05);border-radius:10px;padding:12px;text-align:center}
  .stat-n{font-size:1.8rem;font-weight:400;color:#e8cfa0;display:block;line-height:1}
  .stat-l{font-size:.7rem;color:rgba(240,234,216,.55);margin-top:4px;font-family:system-ui,sans-serif;text-transform:uppercase;letter-spacing:.1em}
  .guest-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,.12)}
  .guest-row:last-child{border-bottom:none}
  .avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;font-family:system-ui,sans-serif}
  .avatar.yes{background:rgba(111,207,151,.18);color:#6fcf97}
  .avatar.no{background:rgba(235,87,87,.18);color:#eb5757}
  .badge{display:inline-block;border-radius:20px;padding:2px 10px;font-size:.72rem;font-family:system-ui,sans-serif;font-weight:600;margin-left:6px}
  .badge.yes{background:rgba(111,207,151,.12);color:#6fcf97;border:0.5px solid #6fcf97}
  .badge.no{background:rgba(235,87,87,.12);color:#eb5757;border:0.5px solid #eb5757}
  .guest-name{font-family:system-ui,sans-serif;font-weight:500;font-size:.95rem}
  .guest-meta{font-size:.78rem;color:rgba(240,234,216,.55);font-family:system-ui,sans-serif;margin-top:4px;line-height:1.6}
  .guest-note{font-size:.8rem;color:rgba(240,234,216,.55);font-style:italic;margin-top:4px;font-family:system-ui,sans-serif}
  .hidden{display:none}
  .footer{text-align:center;color:rgba(240,234,216,.35);font-size:.75rem;font-family:system-ui,sans-serif;margin-top:1rem}
  /* Setup banner */
  .setup{background:rgba(200,169,110,.08);border:0.5px solid rgba(200,169,110,.35);border-radius:12px;padding:1.3rem 1.5rem;max-width:560px;margin:0 auto 1.5rem;font-family:system-ui,sans-serif;font-size:.85rem;line-height:1.7;color:rgba(240,234,216,.8)}
  .setup strong{color:#e8cfa0}
  .setup a{color:#c8a96e;text-decoration:none}
  .setup input{margin-top:.6rem;font-size:.85rem;letter-spacing:.04em}
  .setup-btn{margin-top:.7rem;padding:8px 22px;border-radius:8px;border:0.5px solid #c8a96e;background:transparent;color:#c8a96e;cursor:pointer;font-family:system-ui,sans-serif;font-size:.85rem}
  .setup-steps{list-style:none;padding:0;margin:.5rem 0 0}
  .setup-steps li{padding:2px 0}
  .setup-steps li::before{content:"→ ";color:#c8a96e}
</style>
</head>
<body>



<!-- ── HERO ── -->
<div class="hero">
  <div style="font-size:40px;margin-bottom:.5rem">🕯️</div>
  <h1>Dinner at Mehta's</h1>
  <p>You're warmly invited — the more the merrier!</p>
  <div class="details">
    <span>📅 Friday, March 20</span>
    <span>🕕 From 6:00 PM</span>
  </div>
  <div class="details">
    <span>📍 Unit 2510, 100 Upper Madison Ave, North York, ON</span>
  </div>
  <div class="details">
    <span>📞 <a href="tel:+13658330777" style="color:rgba(240,234,216,.55);text-decoration:none">+1 (365) 833-0777</a></span>
  </div>
</div>

<!-- ── TABS ── -->
<div class="tabs">
  <button class="tab active" onclick="showTab('rsvp')">RSVP</button>
  <button class="tab" id="guestTab" onclick="showTab('guests')">Guest list</button>
</div>

<!-- ── RSVP PANEL ── -->
<div id="rsvpPanel" class="card">
  <div id="rsvpForm">
    <p class="section-title">Your RSVP</p>
    <div class="field"><label>Your name *</label><input id="fname" placeholder="First & last name"/></div>
    <div class="field">
      <label>Will you be joining? *</label>
      <div class="yn">
        <button class="yn-btn yes" onclick="setGoing('yes')">Yes, I'll be there! 🎉</button>
        <button class="yn-btn no" onclick="setGoing('no')">Can't make it 😔</button>
      </div>
    </div>
    <div id="extraFields" class="hidden">
      <div class="field"><label>How many guests? (including you)</label><div class="chips" id="guestChips"></div></div>
      <div class="field"><label>Dietary needs</label><div class="chips" id="dietChips"></div></div>
      <div class="field"><label>Expected arrival</label><div class="chips" id="timeChips"></div></div>
      <div class="field"><label>Bringing anything?</label><div class="chips" id="bringChips"></div></div>
    </div>
    <div class="field"><label>Note for Mridul (optional)</label><textarea id="fnote" placeholder="Any questions or notes…"></textarea></div>
    <button class="btn" id="submitBtn" onclick="submitRSVP()" disabled>Submit RSVP</button>
  </div>
  <div id="successBox" class="success hidden">
    <div style="font-size:48px;margin-bottom:1rem" id="successEmoji">🥂</div>
    <h2 id="successTitle">See you tonight!</h2>
    <p id="successMsg"></p>
    <button class="edit-btn" onclick="resetForm()">Edit my response</button>
  </div>
</div>

<!-- ── GUESTS PANEL ── -->
<div id="guestsPanel" class="card hidden">
  <p class="section-title">Guest list</p>
  <div id="guestListContent"><p style="text-align:center;color:rgba(240,234,216,.55);font-family:system-ui,sans-serif;font-size:.9rem;padding:1rem 0">Loading…</p></div>
</div>

<p class="footer">Hosted by Mridul Mehta &nbsp;·&nbsp; North York, ON 🍷</p>

<script>
const DIETARY=["No restrictions","Vegetarian","Vegan","Gluten-free","Nut allergy","Halal","Kosher"];
const TIMES=["6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM+"];
const BRING=["Wine / drinks","Dessert","Appetizer","Just myself"];
const GUESTS=["1","2","3","4+"];

let API_KEY="$2a$10$piyh3WZ1f9KBmVw0XOGZf.43NrRPUb/Om9iZ2FxrpikOXuxidBebW", BIN_ID="";
let state={going:null,guestCount:"1",dietary:"No restrictions",time:"7:00 PM",bringing:"Just myself"};
let allGuests=[];

function loadConfig(){
  BIN_ID=localStorage.getItem("jb_bin")||"";
}

async function initBin(){
  if(BIN_ID){fetchGuests();return;}
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY,"X-Bin-Name":"mehtas-dinner-rsvp"},
      body:JSON.stringify({guests:[]})
    });
    const d=await r.json();
    BIN_ID=d.metadata.id;
    localStorage.setItem("jb_bin",BIN_ID);
    fetchGuests();
  }catch(e){console.error(e);}
}

async function fetchGuests(){
  if(!BIN_ID||!API_KEY)return;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{"X-Master-Key":API_KEY}});
    const d=await r.json();
    allGuests=d.record.guests||[];
    renderGuests();
    updateGuestTab();
  }catch(e){console.error(e);}
}

async function saveGuests(){
  if(!BIN_ID||!API_KEY)return;
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify({guests:allGuests})
  });
}

function buildChips(id,opts,key){
  document.getElementById(id).innerHTML=opts.map(o=>
    `<button class="chip ${state[key]===o?'on':''}" onclick="pick('${key}','${o}','${id}')">${o}</button>`
  ).join("");
}
function pick(key,val,id){
  state[key]=val;
  const map={guestCount:["guestChips",GUESTS],dietary:["dietChips",DIETARY],time:["timeChips",TIMES],bringing:["bringChips",BRING]};
  buildChips(map[key][0],map[key][1],key);
}
function setGoing(v){
  state.going=v;
  document.querySelectorAll(".yn-btn").forEach(b=>b.classList.remove("on"));
  document.querySelector(`.yn-btn.${v}`).classList.add("on");
  document.getElementById("extraFields").classList.toggle("hidden",v!=="yes");
  checkBtn();
}
function checkBtn(){
  document.getElementById("submitBtn").disabled=!(document.getElementById("fname").value.trim()&&state.going);
}
document.getElementById("fname").addEventListener("input",checkBtn);

async function submitRSVP(){
  const name=document.getElementById("fname").value.trim();
  if(!name||!state.going)return;
  document.getElementById("submitBtn").disabled=true;
  document.getElementById("submitBtn").textContent="Saving…";
  const entry={name,going:state.going,guests:state.guestCount,dietary:state.dietary,time:state.time,bringing:state.bringing,note:document.getElementById("fnote").value.trim(),ts:Date.now()};
  allGuests=[...allGuests.filter(g=>g.name.toLowerCase()!==name.toLowerCase()),entry];
  await saveGuests();
  updateGuestTab();
  document.getElementById("rsvpForm").classList.add("hidden");
  document.getElementById("successBox").classList.remove("hidden");
  document.getElementById("successEmoji").textContent=state.going==="yes"?"🥂":"😔";
  document.getElementById("successTitle").textContent=state.going==="yes"?"See you tonight!":"You'll be missed!";
  document.getElementById("successMsg").textContent=state.going==="yes"
    ?`We're expecting you${parseInt(state.guestCount)>1?" + "+(parseInt(state.guestCount)-1):""} around ${state.time}.`
    :"Hope to catch you next time!";
}

function resetForm(){
  state={going:null,guestCount:"1",dietary:"No restrictions",time:"7:00 PM",bringing:"Just myself"};
  document.getElementById("fname").value="";
  document.getElementById("fnote").value="";
  document.querySelectorAll(".yn-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById("extraFields").classList.add("hidden");
  document.getElementById("submitBtn").disabled=true;
  document.getElementById("submitBtn").textContent="Submit RSVP";
  document.getElementById("successBox").classList.add("hidden");
  document.getElementById("rsvpForm").classList.remove("hidden");
}

function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2);}

function renderGuests(){
  const el=document.getElementById("guestListContent");
  const att=allGuests.filter(g=>g.going==="yes");
  const dec=allGuests.filter(g=>g.going==="no");
  const total=att.reduce((s,g)=>s+parseInt(g.guests||1),0);
  if(!allGuests.length){el.innerHTML=`<p style="text-align:center;color:rgba(240,234,216,.55);font-family:system-ui,sans-serif;font-size:.9rem;padding:1rem 0">No RSVPs yet — be the first!</p>`;return;}
  const sorted=[...allGuests].sort((a,b)=>{
    if(a.going==="yes"&&b.going!=="yes")return -1;
    if(b.going==="yes"&&a.going!=="yes")return 1;
    return b.ts-a.ts;
  });
  el.innerHTML=`<div class="stats">
    <div class="stat"><span class="stat-n">${att.length}</span><span class="stat-l">Attending</span></div>
    <div class="stat"><span class="stat-n">${total}</span><span class="stat-l">People coming</span></div>
    <div class="stat"><span class="stat-n">${dec.length}</span><span class="stat-l">Can't make it</span></div>
  </div>
  ${sorted.map(g=>`<div class="guest-row">
    <div class="avatar ${g.going}">${initials(g.name)}</div>
    <div style="flex:1">
      <span class="guest-name">${g.name}</span>
      <span class="badge ${g.going}">${g.going==="yes"?"Coming":"Can't make it"}</span>
      ${g.going==="yes"?`<div class="guest-meta">${g.guests!=="1"?g.guests+" guests · ":""}${g.time} · ${g.dietary} · ${g.bringing}</div>`:""}
      ${g.note?`<div class="guest-note">"${g.note}"</div>`:""}
    </div>
  </div>`).join("")}`;
}

function updateGuestTab(){
  const n=allGuests.length;
  document.getElementById("guestTab").textContent=`Guest list${n?" ("+n+")":""}`;
}

function showTab(t){
  document.getElementById("rsvpPanel").classList.toggle("hidden",t!=="rsvp");
  document.getElementById("guestsPanel").classList.toggle("hidden",t!=="guests");
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("active",i===(t==="rsvp"?0:1)));
  if(t==="guests")fetchGuests();
}

buildChips("guestChips",GUESTS,"guestCount");
buildChips("dietChips",DIETARY,"dietary");
buildChips("timeChips",TIMES,"time");
buildChips("bringChips",BRING,"bringing");
loadConfig();
if(API_KEY&&BIN_ID)fetchGuests();
</script>
</body>
</html>
